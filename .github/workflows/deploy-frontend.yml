name: Deploy Frontend → Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  deploy-frontend:
    name: Build & Deploy Next.js to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ─── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ─── Write production .env ─────────────────────────────────────────────
      - name: Write production environment file
        working-directory: frontend
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CDN_URL=${{ secrets.NEXT_PUBLIC_CDN_URL }}
          EOF

      # ─── Build ────────────────────────────────────────────────────────────
      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # ─── Upload artifact (optional — useful for debugging) ─────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/out/
          retention-days: 3

      # ─── Setup SSH ────────────────────────────────────────────────────────
      - name: Setup SSH for Hostinger deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ─── Deploy to Hostinger ──────────────────────────────────────────────
      - name: Deploy to Hostinger via rsync
        run: |
          rsync \
            --archive \
            --compress \
            --delete \
            --verbose \
            --progress \
            --exclude='.htaccess' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            frontend/out/ \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DOCUMENT_ROOT }}/"

      # ─── Verify deployment ────────────────────────────────────────────────
      - name: Verify frontend is live
        run: |
          sleep 10
          response=$(curl -sf "${{ secrets.NEXT_PUBLIC_APP_URL }}" -w "%{http_code}" -o /dev/null 2>&1 || echo "000")
          echo "HTTP status: $response"
          if [[ "$response" == "200" ]]; then
            echo "✅  Frontend deployment verified"
          else
            echo "⚠️  HTTP $response — check Hostinger manually"
          fi

      # ─── Summary ──────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ secrets.NEXT_PUBLIC_APP_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

name: Deploy Backend → DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'rag-service/**'
      - 'ecosystem.config.js'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install all dependencies (including devDeps)
        working-directory: backend
        run: npm ci

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

  deploy-api:
    name: Deploy Node.js API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync backend source to server
        run: |
          rsync \
            --archive \
            --compress \
            --delete \
            --verbose \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='logs/' \
            --exclude='.env' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            backend/ \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/potupartners/backend/"

      - name: Sync ecosystem config
        run: |
          scp -i ~/.ssh/id_ed25519 \
            ecosystem.config.js \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/potupartners/"

      - name: Build, migrate, and reload API
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            << 'REMOTE'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            export NODE_ENV=production   # ✅ Ensures SSL + production config

            cd /opt/potupartners/backend

            echo "→ Installing npm dependencies..."
            npm ci

            echo "→ Compiling TypeScript..."
            npx tsc --project tsconfig.json

            echo "→ Running database migrations..."
            node dist/db/migrate.js

            echo "→ Zero-downtime reload..."
            pm2 reload potupartners-api --update-env 2>/dev/null || \
              pm2 start /opt/potupartners/ecosystem.config.js --only potupartners-api --env production

            pm2 save

            echo "✅  API deployment complete"
          REMOTE

      - name: Verify API health
        run: |
          sleep 8
          for i in 1 2 3; do
            STATUS=$(curl -sf "https://api.potupartners.site/health" \
              -w "\n%{http_code}" 2>/dev/null | tail -1 || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅  API health check passed (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i failed (HTTP $STATUS), retrying in 5s..."
            sleep 5
          done
          echo "❌  API health check failed after 3 attempts"
          exit 1

  deploy-rag:
    name: Deploy RAG Microservice
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync RAG service source
        run: |
          rsync \
            --archive \
            --compress \
            --delete \
            --verbose \
            --exclude='venv/' \
            --exclude='chroma_db/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            rag-service/ \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/potupartners/rag-service/"

      - name: Install Python dependencies and reload RAG service
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            << 'REMOTE'
            set -euo pipefail
            cd /opt/potupartners/rag-service

            echo "→ Installing Python dependencies..."
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q
            deactivate

            echo "→ Reloading RAG service..."
            pm2 reload potupartners-rag --update-env 2>/dev/null || \
              pm2 start /opt/potupartners/ecosystem.config.js --only potupartners-rag --env production

            pm2 save
            echo "✅  RAG deployment complete"
          REMOTE

      - name: Verify RAG service health (internal)
        run: |
          sleep 12
          STATUS=$(ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            "curl -sf http://127.0.0.1:8000/health -w '\n%{http_code}' | tail -1" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "✅  RAG service health check passed"
          else
            echo "❌  RAG service health check failed (HTTP $STATUS)"
            exit 1
          fi

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-rag]
    if: always()

    steps:
      - name: Write GitHub summary
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js API | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RAG Microservice | ${{ needs.deploy-rag.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY